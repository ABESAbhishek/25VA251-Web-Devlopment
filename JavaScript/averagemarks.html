<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let marks=[85, 90, 78, 92, 88];
        let total=0;
        for(let i=0; i<marks.length; i++)
        {
            total+=marks[i];
        }
        let average=total/marks.length;
        console.log("Total marks: " + total);
        console.log("Average marks: " + average);
        if(average>=90)
        {
            console.log("Grade: A");
        }
        else if(average>=80)
        {
            console.log("Grade: B");
        }
        else if(average>=70)
        {
            console.log("Grade: C");
        }
        else if(average>=60)
        {
            console.log("Grade: D");
        }
        else
        {
            console.log("Grade: F");
        }
    </script>
</body>
</html>
