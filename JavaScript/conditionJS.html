<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition in javaScript</title>
</head>
<body>
    <script>
        //Conditional statements in JavaScript control the flow of execution, allowing the program to perform different actions based on whether a condition is true or false. 
        // The primary types of conditional statements are if, else, else if, switch, and the ternary operator.
        let age=33;
        //if-else statement
        if(age<18)
        {
            console.log("You are a minor.");
        }
        else
        {
            console.log("You are an adult.");
        }

        //switch case statement
        let grade='A';
        switch(grade)
        {
            case 'A':
                result="First Division";
                break;
            case 'B':
                result="Second Division";
                break;
            default:
                result="Fail";
        }
        console.log(result);
        //Same code using if-else statement
        let grade2=30;
        if(grade2==100)
        {
            result="First Division";
        }
        else if(grade2>=80)
        {
            result="Second Division";
        }
        else if(grade2>=60)
        {
            result="Third Division";
        }
        else if(grade2>=40)
        {
            result="Pass";
        }
        else
        {
            result="Fail";
        }
        console.log(result);
    </script>
</body>
</html>
